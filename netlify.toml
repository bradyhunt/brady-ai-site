[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/news/:slug"
  to = "/"
  status = 301

[[redirects]]
  from = "/assets/pubimg/*"
  to = "/images/publications/:splat"
  status = 301

[[redirects]]
  from = "/assets/pdf/*"
  to = "/pdf/:splat"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
